name: flutter_state_migrator
description: "Automated CLI tool to migrate Flutter apps from Provider, BLoC, GetX, and MobX to Riverpod."
version: 2.2.2
homepage: https://github.com/RanveerSingh1997/flutter-state-migrator
repository: https://github.com/RanveerSingh1997/flutter-state-migrator

executables:
  migrator: migrator

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  provider: ^6.1.5+1
  flutter_riverpod: ^3.3.1
  analyzer: ^10.0.1
  args: ^2.7.0
  path: ^1.9.1
  yaml: ^3.1.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  flutter_bloc: ^9.1.1
  get: ^4.7.2
  mobx: ^2.5.0
  lints: ^6.1.0

flutter:
  uses-material-design: true
